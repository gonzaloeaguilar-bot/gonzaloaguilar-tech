<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — gonzalo.tech</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <meta name="author" content="Gonzalo Aguilar">
  <meta property="og:title" content="{{TITLE}} — gonzalo.tech">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://gonzalo.tech/output/{{SLUG}}.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="https://gonzalo.tech/output/{{SLUG}}.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{TITLE}}",
    "description": "{{META_DESCRIPTION}}",
    "author": {
      "@type": "Person",
      "name": "Gonzalo Aguilar",
      "url": "https://gonzalo.tech"
    },
    "publisher": {
      "@type": "Organization",
      "name": "gonzalo.tech"
    },
    "url": "https://gonzalo.tech/output/{{SLUG}}.html",
    "inLanguage": "{{LANG}}"
  }
  </script>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Brand tokens */
    :root {
      --ink: #0F172A;
      --slate: #334155;
      --muted: #64748B;
      --subtle: #94A3B8;
      --border: #E2E8F0;
      --surface: #F8FAFC;
      --white: #FFFFFF;
      --red: #DC2626;
      --green: #16A34A;
      --amber: #D97706;
      --font-heading: Georgia, 'Times New Roman', serif;
      --font-body: Calibri, 'Gill Sans', 'Segoe UI', sans-serif;
      --font-code: Consolas, 'Courier New', monospace;
    }

    body {
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.7;
      color: var(--slate);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Header */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
      margin-bottom: 3rem;
    }
    .site-header a {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      color: var(--ink);
      text-decoration: none;
    }

    /* Article */
    article { text-align: left; }

    h1 {
      font-family: var(--font-heading);
      font-size: 2.25rem;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h2 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      color: var(--ink);
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
    }

    h3 {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      color: var(--ink);
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin-bottom: 1.25rem;
    }

    ul, ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }
    li { margin-bottom: 0.4rem; }

    blockquote {
      border-left: 3px solid var(--ink);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--surface);
      color: var(--ink);
      font-style: italic;
    }

    code {
      font-family: var(--font-code);
      background: var(--surface);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
    }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    pre code {
      background: none;
      padding: 0;
    }

    strong { color: var(--ink); }

    a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    a:hover { color: var(--muted); }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* PDF download banner */
    .pdf-download {
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .pdf-download p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--slate);
    }
    .pdf-download a {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      background: var(--ink);
      color: var(--white);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .pdf-download a:hover {
      background: var(--slate);
      color: var(--white);
    }

    /* Author bio */
    .author-bio {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Footer */
    .site-footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.85rem;
      color: var(--subtle);
    }

    /* Responsive */
    @media (max-width: 600px) {
      body { font-size: 16px; }
      h1 { font-size: 1.75rem; }
      h2 { font-size: 1.3rem; }
      .container { padding: 1rem; }
    }

    /* Print */
    @media print {
      body { font-size: 12pt; color: #000; }
      .site-header, .site-footer { display: none; }
      .container { max-width: 100%; padding: 0; }
      a { text-decoration: none; color: #000; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a href="../index.html">gonzalo.tech</a>
    </header>

    <article>
      {{CONTENT}}

      <div class="pdf-download">
        <p><strong>Prefer a PDF?</strong> Download this guide free — no email required.</p>
        <a href="../pdfs/{{SLUG}}.pdf" download>Download PDF</a>
      </div>
    </article>

    <footer class="site-footer">
      &copy; {{YEAR}} gonzalo.tech — Gonzalo Aguilar
    </footer>
  </div>
</body>
</html>
